---
  - name: Install Docker and Docker Compose
    hosts: target1
    become: true

    vars:
      docker_compose_version: "v2.27.0"

    tasks:

    # ──────────────────────────────────────────────
    # UBUNTU / DEBIAN
    # ──────────────────────────────────────────────
    - name: "[Ubuntu] Update APT cache"
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: "[Ubuntu] Install Docker dependencies"
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - gnupg
        state: present
      when: ansible_os_family == "Debian"

    - name: "[Ubuntu] Add Docker GPG key"
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      when: ansible_os_family == "Debian"

    - name: "[Ubuntu] Add Docker APT repository"
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
      when: ansible_os_family == "Debian"

    - name: "[Ubuntu] Install Docker CE"
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    # ──────────────────────────────────────────────
    # RHEL / CENTOS / AMAZON LINUX
    # ──────────────────────────────────────────────
    - name: "[RHEL] Remove old conflicting packages"
      yum:
        name:
          - docker
          - docker-client
          - docker-common
          - docker-engine
        state: absent
      when: ansible_os_family == "RedHat"

    - name: "[RHEL] Install required utilities"
      yum:
        name:
          - yum-utils
          - device-mapper-persistent-data
          - lvm2
        state: present
      when: ansible_os_family == "RedHat"

    - name: "[RHEL] Add Docker YUM repository"
      get_url:
        url: https://download.docker.com/linux/centos/docker-ce.repo
        dest: /etc/yum.repos.d/docker-ce.repo
        mode: '0644'
      when: ansible_os_family == "RedHat"

    - name: "[RHEL] Install Docker CE"
      yum:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin 
        state: present
      when: ansible_os_family == "RedHat"

    # ──────────────────────────────────────────────
    # COMMON (both distros)
    # ──────────────────────────────────────────────
    - name: "Start and enable Docker service"
      service:
        name: docker
        state: started
        enabled: yes

    - name: "Add deployment user to docker group"
      user:
        name: root
        groups: docker
        append: yes

    - name: "Install Docker Compose (standalone binary)"
      get_url:
        url: "https://github.com/docker/compose/releases/download/{{ docker_compose_version }}/docker-compose-linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: "Verify Docker installation"
      command: docker --version
      register: docker_version_output
      changed_when: false

    - name: "Verify Docker Compose installation"
      command: docker compose version
      register: compose_version_output
      changed_when: false

    - name: "Print installed versions"
      debug:
        msg:
          - "{{ docker_version_output.stdout }}"
          - "{{ compose_version_output.stdout }}"
